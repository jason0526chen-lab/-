<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>鈺霏的抓周大預測</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #FDFBF7; }
        .tab-active { color: #C2A387; border-bottom: 2px solid #C2A387; }
        .animate-fade-in { animation: fadeIn 0.5s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, serverTimestamp, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // ⚠️ 已經將原本宇恩的資料庫設定移除。請朋友申請好新的 Firebase 後，將新的設定貼在這裡
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT_ID.appspot.com",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // 將功能掛載到 window 讓 React 程式碼讀取
        window.fb = { db, auth, collection, addDoc, onSnapshot, serverTimestamp, signInAnonymously, query, orderBy, limit };
    </script>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const SvgIcon = ({ size = 24, className = '', fill = 'none', strokeWidth = "2", children }) => (
          <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" className={className}>{children}</svg>
        );

        const Home = (props) => <SvgIcon {...props}><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></SvgIcon>;
        const BarChart2 = (props) => <SvgIcon {...props}><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></SvgIcon>;
        const MessageCircle = (props) => <SvgIcon {...props}><path d="M7.9 20A9 9 0 1 0 4 16.1L2 22Z"/></SvgIcon>;
        const Sparkles = (props) => <SvgIcon {...props} strokeWidth="1.5"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/><path d="M5 3v4M3 5h4M19 3v4M17 5h4M5 19v4M3 21h4"/></SvgIcon>;
        const Send = (props) => <SvgIcon {...props}><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></SvgIcon>;
        const CheckCircle2 = (props) => <SvgIcon {...props}><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></SvgIcon>;

        // 依照附圖完整更新 24 項抓周物品
        const ITEMS = [
            { id: 'piano', name: '鋼琴', desc: '音樂家', emoji: '🎹' },
            { id: 'baozi', name: '包子', desc: '餐飲大亨', emoji: '🥟' },
            { id: 'camera', name: '相機', desc: '攝影師', emoji: '📷' },
            { id: 'spatula', name: '鍋鏟', desc: '世界名廚', emoji: '🍳' },
            { id: 'abacus', name: '算盤', desc: '會計師', emoji: '🧮' },
            { id: 'gavel', name: '木槌', desc: '法官', emoji: '🔨' },
            { id: 'brush', name: '毛筆', desc: '律師', emoji: '🖌️' },
            { id: 'ruler', name: '直尺', desc: '建築師', emoji: '📏' },
            { id: 'arrow_gun', name: '箭/槍', desc: '軍警職', emoji: '🏹' },
            { id: 'comb', name: '木梳', desc: '造型師', emoji: '🪮' },
            { id: 'ointment', name: '藥膏', desc: '藥劑師', emoji: '🧴' },
            { id: 'computer', name: '電腦', desc: 'IT工程師', emoji: '💻' },
            { id: 'syringe', name: '針筒', desc: '護理師', emoji: '💉' },
            { id: 'ingot', name: '元寶', desc: '首富', emoji: '💰' },
            { id: 'ball', name: '球類', desc: '運動健將', emoji: '⚽' },
            { id: 'stethoscope', name: '聽診器', desc: '醫生', emoji: '🩺' },
            { id: 'palette', name: '畫板', desc: '藝術家', emoji: '🎨' },
            { id: 'blackboard', name: '黑板', desc: '教授', emoji: '👩‍🏫' },
            { id: 'astronaut', name: '太空人', desc: '太空人', emoji: '👩‍🚀' },
            { id: 'magnifier', name: '放大鏡', desc: '科學家', emoji: '🔍' },
            { id: 'airplane', name: '飛機', desc: '機長', emoji: '✈️' },
            { id: 'clapperboard', name: '場記板', desc: '導演', emoji: '🎬' },
            { id: 'mic', name: '麥克風', desc: '主播', emoji: '🎙️' },
            { id: 'seal', name: '官印', desc: '公務員', emoji: '💮' },
        ];

        function App() {
            const [activeTab, setActiveTab] = useState('vote');
            const [votes, setVotes] = useState([]);
            const [messages, setMessages] = useState([]);
            const [name, setName] = useState('');
            const [msgText, setMsgText] = useState('');
            const [selected, setSelected] = useState([]);
            const [voted, setVoted] = useState(localStorage.getItem('voted_yufei_final') === 'true');
            const [isSending, setIsSending] = useState(false);

            useEffect(() => {
                const init = async () => {
                    while(!window.fb) await new Promise(r => setTimeout(r, 100));
                    const { db, auth, collection, onSnapshot, signInAnonymously } = window.fb;
                    
                    try {
                        await signInAnonymously(auth);
                    } catch (error) {
                        console.warn("被無痕模式擋住登入，已啟動備用讀取模式");
                    }
                    
                    onSnapshot(collection(db, "votes"), s => setVotes(s.docs.map(d => d.data())));
                    
                    onSnapshot(collection(db, "messages"), s => {
                        const msgs = s.docs.map(d => {
                            const data = d.data();
                            return { ...data, safeTime: data.time ? data.time.toMillis() : Date.now() };
                        }).sort((a, b) => b.safeTime - a.safeTime);
                        setMessages(msgs);
                    });
                };
                init();
            }, []);

            const submitVote = async () => {
                if(selected.length !== 3 || !name) return;
                const { db, collection, addDoc, serverTimestamp } = window.fb;
                try {
                    await addDoc(collection(db, "votes"), { name, items: selected, time: serverTimestamp() });
                    localStorage.setItem('voted_yufei_final', 'true');
                    setVoted(true);
                    setActiveTab('results');
                    window.scrollTo(0, 0);
                } catch(e) {
                    alert('送出失敗，請重試！');
                }
            };

            const submitMessage = async () => {
                if(!name || !msgText) {
                    alert('請填寫名字和祝福內容喔！');
                    return;
                }
                setIsSending(true);
                const { db, collection, addDoc, serverTimestamp } = window.fb;
                try {
                    await addDoc(collection(db, "messages"), { name, text: msgText, time: serverTimestamp() });
                    setMsgText('');
                    alert('祝福已送出！');
                } catch(e) {
                    alert('留言失敗，請重試！');
                }
                setIsSending(false);
            };

            const toggleSelection = (id) => {
                if (selected.includes(id)) {
                    setSelected(selected.filter(item => item !== id));
                } else if (selected.length < 3) {
                    setSelected([...selected, id]);
                }
            };

            return (
                <div className="max-w-md mx-auto min-h-screen pb-28 px-4 pt-8">
                    {/* ========== 1. 投票區 ========== */}
                    {activeTab === 'vote' && (
                        <div className="animate-fade-in">
                            <h1 className="text-2xl font-bold text-[#6B5A4E] text-center mb-6 tracking-widest">鈺霏的抓周預測</h1>
                            {!voted ? (
                                <div className="bg-white p-6 rounded-3xl shadow-sm border border-[#F2E8DA]">
                                    <input className="w-full p-4 mb-4 rounded-2xl border-2 border-[#F2E8DA] focus:border-[#D4BCA1] outline-none" placeholder="您怎麼稱呼？ (例：大阿姨)" value={name} onChange={e=>setName(e.target.value)} />
                                    <p className="text-xs text-[#8C7A6D] mb-4 text-center">請選出您心目中鈺霏會抓到的 3 個物品 ({selected.length}/3)</p>
                                    
                                    <div className="grid grid-cols-3 gap-3 mb-6">
                                        {ITEMS.map(item => {
                                            const isSelected = selected.includes(item.id);
                                            return (
                                                <button
                                                    key={item.id}
                                                    onClick={() => toggleSelection(item.id)}
                                                    className={`flex flex-col items-center justify-center p-3 rounded-2xl border-2 transition-all ${isSelected ? 'border-[#C2A387] bg-[#FDFBF7] shadow-sm' : 'border-transparent bg-[#F9F6F0] hover:bg-[#F2E8DA]'}`}
                                                >
                                                    <span className="text-2xl mb-1">{item.emoji}</span>
                                                    <span className="text-xs font-medium text-[#6B5A4E]">{item.name}</span>
                                                </button>
                                            )
                                        })}
                                    </div>
                                    
                                    <button 
                                        onClick={submitVote}
                                        disabled={selected.length !== 3 || !name}
                                        className="w-full bg-[#C2A387] text-white p-4 rounded-2xl font-bold flex items-center justify-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed transition-all"
                                    >
                                        <Sparkles size={20} />
                                        送出預測
                                    </button>
                                </div>
                            ) : (
                                <div className="bg-white p-8 rounded-3xl shadow-sm border border-[#F2E8DA] text-center">
                                    <CheckCircle2 size={48} className="text-[#C2A387] mx-auto mb-4" />
                                    <h2 className="text-xl font-bold text-[#6B5A4E] mb-2">預測已送出！</h2>
                                    <p className="text-[#8C7A6D]">謝謝您的參與，點擊下方「戰況」看看大家的預測吧！</p>
                                </div>
                            )}
                        </div>
                    )}

                    {/* ========== 2. 戰況區 ========== */}
                    {activeTab === 'results' && (
                        <div className="animate-fade-in">
                            <h1 className="text-2xl font-bold text-[#6B5A4E] text-center mb-6 tracking-widest">目前預測戰況</h1>
                            <div className="bg-white p-6 rounded-3xl shadow-sm border border-[#F2E8DA]">
                                {votes.length === 0 ? (
                                    <p className="text-center text-[#8C7A6D]">目前還沒有人投票喔，趕快去投下神聖的一票！</p>
                                ) : (
                                    (() => {
                                        // 計算票數
                                        const counts = {};
                                        votes.forEach(vote => {
                                            vote.items.forEach(itemId => {
                                                counts[itemId] = (counts[itemId] || 0) + 1;
                                            });
                                        });
                                        
                                        // 排序並取最高票作為進度條比例基準
                                        const sortedResults = Object.keys(counts)
                                            .map(id => ({ id, count: counts[id], item: ITEMS.find(i => i.id === id) }))
                                            .sort((a, b) => b.count - a.count);
                                            
                                        const maxVotes = sortedResults.length > 0 ? sortedResults[0].count : 1;

                                        return sortedResults.map((result, index) => (
                                            <div key={result.id} className="mb-4 last:mb-0">
                                                <div className="flex justify-between items-end mb-1">
                                                    <span className="text-sm font-medium text-[#6B5A4E] flex items-center gap-2">
                                                        <span>{result.item.emoji}</span> {result.item.name}
                                                    </span>
                                                    <span className="text-xs font-bold text-[#C2A387]">{result.count} 票</span>
                                                </div>
                                                <div className="w-full bg-[#F9F6F0] rounded-full h-2.5">
                                                    <div className="bg-[#C2A387] h-2.5 rounded-full transition-all duration-1000" style={{ width: `${(result.count / maxVotes) * 100}%` }}></div>
                                                </div>
                                            </div>
                                        ));
                                    })()
                                )}
                            </div>
                        </div>
                    )}

                    {/* ========== 3. 祝福區 ========== */}
                    {activeTab === 'messages' && (
                        <div className="animate-fade-in flex flex-col h-[calc(100vh-140px)]">
                            <h1 className="text-2xl font-bold text-[#6B5A4E] text-center mb-6 tracking-widest shrink-0">給鈺霏的祝福</h1>
                            
                            <div className="flex-1 overflow-y-auto mb-4 space-y-4 pr-1">
                                {messages.length === 0 ? (
                                    <p className="text-center text-[#8C7A6D] mt-10">來搶頭香，留下第一個祝福吧！</p>
                                ) : (
                                    messages.map((msg, i) => (
                                        <div key={i} className="bg-white p-4 rounded-2xl shadow-sm border border-[#F2E8DA]">
                                            <div className="flex items-center gap-2 mb-2">
                                                <div className="w-8 h-8 rounded-full bg-[#C2A387] text-white flex items-center justify-center font-bold text-sm">
                                                    {msg.name.charAt(0)}
                                                </div>
                                                <span className="font-bold text-[#6B5A4E] text-sm">{msg.name}</span>
                                            </div>
                                            <p className="text-[#8C7A6D] text-sm whitespace-pre-wrap">{msg.text}</p>
                                        </div>
                                    ))
                                )}
                            </div>

                            <div className="shrink-0 bg-white p-4 rounded-3xl shadow-sm border border-[#F2E8DA]">
                                <input 
                                    className="w-full p-3 mb-2 rounded-xl bg-[#F9F6F0] border-none focus:ring-2 focus:ring-[#D4BCA1] outline-none text-sm" 
                                    placeholder="您的名字 (若投票有填寫會自動帶入)" 
                                    value={name} 
                                    onChange={e=>setName(e.target.value)} 
                                />
                                <div className="flex gap-2">
                                    <textarea 
                                        className="flex-1 p-3 rounded-xl bg-[#F9F6F0] border-none focus:ring-2 focus:ring-[#D4BCA1] outline-none text-sm resize-none" 
                                        rows="2" 
                                        placeholder="寫下想對鈺霏說的話..." 
                                        value={msgText} 
                                        onChange={e=>setMsgText(e.target.value)}
                                    ></textarea>
                                    <button 
                                        onClick={submitMessage}
                                        disabled={isSending || !name || !msgText}
                                        className="bg-[#C2A387] text-white p-4 rounded-xl flex items-center justify-center disabled:opacity-50 transition-all"
                                    >
                                        <Send size={20} />
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* ========== 底部導覽列 ========== */}
                    <div className="fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur-md border-t border-[#F2E8DA] px-6 py-4 flex justify-around items-center max-w-md mx-auto z-50">
                        <button onClick={() => setActiveTab('vote')} className={`flex flex-col items-center gap-1 transition-colors ${activeTab === 'vote' ? 'text-[#C2A387]' : 'text-[#D4BCA1]'}`}>
                            <Home size={24} />
                            <span className="text-[10px] font-bold">預測</span>
                        </button>
                        <button onClick={() => setActiveTab('results')} className={`flex flex-col items-center gap-1 transition-colors ${activeTab === 'results' ? 'text-[#C2A387]' : 'text-[#D4BCA1]'}`}>
                            <BarChart2 size={24} />
                            <span className="text-[10px] font-bold">戰況</span>
                        </button>
                        <button onClick={() => setActiveTab('messages')} className={`flex flex-col items-center gap-1 transition-colors ${activeTab === 'messages' ? 'text-[#C2A387]' : 'text-[#D4BCA1]'}`}>
                            <MessageCircle size={24} />
                            <span className="text-[10px] font-bold">祝福</span>
                        </button>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
